<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#12131f" />
  <title>Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #12131f;
      color: #e2e2f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
    h1 span { color: #6c6ffd; }
    .sub { font-size: 0.9rem; color: #8b8ca8; margin-bottom: 2.5rem; }
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: #1e1f32;
      border: 1px solid #3d3e5c;
      border-radius: 16px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: border-color .2s, transform .2s;
      text-align: left;
    }
    .card:hover { border-color: #6c6ffd; transform: translateY(-2px); }
    .card-icon {
      font-size: 2.2rem;
      width: 56px; height: 56px;
      background: #2a2b45;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card p  { font-size: 0.8rem; color: #8b8ca8; line-height: 1.5; }
    .tag {
      display: inline-block; margin-top: 0.6rem;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 4px;
      background: #1e2a4a; color: #a5a6ff;
    }
    footer { margin-top: 3rem; font-size: 0.75rem; color: #475569; }
    footer a { color: #6c6ffd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#127918; <span>Games</span></h1>
    <p class="sub">Mobile-ready browser games — install any as a home screen app</p>
    <div class="cards">
      <a class="card" href="math-game/">
        <div class="card-icon">&#129518;</div>
        <div>
          <h2>Math Brain Booster</h2>
          <p>Mental math trainer — all four operations, adjustable difficulty, missed-problem bank.</p>
          <span class="tag">PWA</span>
        </div>
      </a>
    </div>
    <footer>Built by Jon Larson &nbsp;·&nbsp; <a href="https://github.com/jongreglarson/games">GitHub</a></footer>
  </div>
</body>
</html>
